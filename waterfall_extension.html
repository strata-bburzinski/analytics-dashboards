<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Waterfall</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://extensiongallery.tableau.com/resources/tableau.extensions.1.latest.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: white; padding: 16px; }
  h2 { font-size: 0.9rem; font-weight: 600; color: #374151; margin-bottom: 12px; }
  #status { font-size: 0.75rem; color: #9ca3af; margin-bottom: 8px; min-height: 1.2em; }
  canvas { max-height: 300px; }
</style>
</head>
<body>
<h2>12-Month Customer Waterfall</h2>
<div id="status">Connecting to Tableau...</div>
<canvas id="waterfall"></canvas>

<script>
// Name of the hidden worksheet on the dashboard that provides account-level data
const WORKSHEET_NAME = 'Waterfall Source';

const palette = { blue: '#2563eb', red: '#dc2626', green: '#16a34a' };
const fmtN = v => v.toLocaleString();
const pct  = (v, t) => t > 0 ? (v / t * 100).toFixed(1) + '%' : '—';

let chart = null;

function renderChart(wf) {
  const floats    = [0, wf.start - wf.churned, wf.start - wf.churned, 0];
  const bars      = [wf.start, wf.churned, wf.newCusts, wf.end];
  const barColors = [palette.blue, palette.red, palette.green, palette.blue];
  const wfLabels  = ['Start (12m ago)', 'Churned', 'New', 'End (now)'];

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('waterfall'), {
    type: 'bar',
    data: {
      labels: wfLabels,
      datasets: [
        { label: '_float', data: floats, backgroundColor: 'transparent',
          borderColor: 'transparent', stack: 'wf' },
        { label: 'Customers', data: bars, backgroundColor: barColors, stack: 'wf' }
      ]
    },
    options: {
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          animation: false,
          backgroundColor: 'rgba(15,23,42,0.92)',
          titleColor: '#94a3b8', bodyColor: '#f1f5f9',
          padding: 10, cornerRadius: 6, boxPadding: 4,
          filter: ctx => ctx.dataset.label !== '_float',
          callbacks: {
            title: ctx => wfLabels[ctx[0].dataIndex],
            label: ctx => {
              const i = ctx.dataIndex, v = ctx.parsed.y;
              if (i === 0) return [' Start: ' + fmtN(v) + ' customers'];
              if (i === 1) return [' Churned: ' + fmtN(v), ' Churn rate: ' + pct(v, wf.start)];
              if (i === 2) return [' New: ' + fmtN(v), ' Growth rate: ' + pct(v, wf.start)];
              if (i === 3) return [' End: ' + fmtN(v),
                ' Net change: ' + (wf.end >= wf.start ? '+' : '') + fmtN(wf.end - wf.start)];
            }
          }
        }
      },
      scales: {
        y: { stacked: true, ticks: { callback: v => fmtN(v) }, grid: { color: '#f3f4f6' },
             min: 0, max: Math.ceil(wf.start * 1.1 / 100) * 100 },
        x: { stacked: true, grid: { display: false } }
      }
    }
  });
  document.getElementById('status').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

async function loadAndRender() {
  try {
    document.getElementById('status').textContent = 'Loading data...';
    const dashboard = tableau.extensions.dashboardContent.dashboard;
    const ws = dashboard.worksheets.find(w => w.name === WORKSHEET_NAME);

    if (!ws) {
      document.getElementById('status').textContent =
        'Worksheet "' + WORKSHEET_NAME + '" not found on this dashboard.';
      return;
    }

    const data = await ws.getSummaryDataAsync({ maxRows: 100000, ignoreSelection: true });

    // Map column names to indices
    const cols = {};
    data.columns.forEach((c, i) => { cols[c.fieldName] = i; });

    const missing = ['Account ID', 'Is Active Now', 'Was Active 12m Ago']
      .filter(n => cols[n] === undefined);
    if (missing.length) {
      document.getElementById('status').textContent =
        'Missing columns in "Waterfall Source": ' + missing.join(', ');
      return;
    }

    const startSet = new Set(), endSet = new Set();
    data.data.forEach(row => {
      const id        = row[cols['Account ID']].formattedValue;
      const isActive  = Number(row[cols['Is Active Now']].value);
      const wasActive = Number(row[cols['Was Active 12m Ago']].value);
      if (wasActive >= 1) startSet.add(id);
      if (isActive  >= 1) endSet.add(id);
    });

    let churned = 0;
    startSet.forEach(id => { if (!endSet.has(id)) churned++; });
    const newCusts = [...endSet].filter(id => !startSet.has(id)).length;

    renderChart({ start: startSet.size, churned, newCusts, end: endSet.size });
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

document.getElementById('status').textContent = 'tableau object: ' + (typeof tableau) +
  ' | extensions: ' + (typeof tableau !== 'undefined' ? typeof tableau.extensions : 'n/a');

setTimeout(() => {
  if (document.getElementById('status').textContent.startsWith('tableau object:')) {
    document.getElementById('status').textContent = 'Timed out — initializeAsync never called. tableau type: ' + typeof tableau;
  }
}, 5000);

tableau.extensions.initializeAsync().then(() => {
  loadAndRender();
  tableau.extensions.dashboardContent.dashboard.worksheets.forEach(ws => {
    ws.addEventListener(tableau.TableauEventType.FilterChanged, loadAndRender);
  });
}).catch(err => {
  document.getElementById('status').textContent = 'Could not connect to Tableau: ' + err.message;
});
</script>
</body>
</html>
